  <style>
    *  { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F9F7F2; color: #091B14; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    h1,h2,h3,h4 { font-family: 'Newsreader', Georgia, serif; }

    /* ── Flip animation ───────────────────────────── */
    .flip-wrap  { perspective: 1400px; }
    .flip-inner {
      transform-style: preserve-3d;
      transition: transform 0.78s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    .flip-inner.flipped { transform: rotateY(180deg); }
    .flip-face  { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .flip-back  {
      transform: rotateY(180deg);
      position: absolute; inset: 0;
      overflow-y: auto;
    }

    /* ── Score ring ───────────────────────────────── */
    .ring-track { stroke: rgba(9,27,20,0.06); }
    .ring-fill  { transition: stroke-dashoffset 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.4s; }

    /* ── Progress bar ─────────────────────────────── */
    .prog-fill { transition: width 0.85s cubic-bezier(0.16, 1, 0.3, 1); }

    /* ── Fade-up entrance ─────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    .au  { animation: fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) both; }
    .d1  { animation-delay: 0s;     }
    .d2  { animation-delay: 0.07s;  }
    .d3  { animation-delay: 0.14s;  }
    .d4  { animation-delay: 0.21s;  }
    .d5  { animation-delay: 0.28s;  }

    /* ── Diff card ────────────────────────────────── */
    .diff-card {
      border: 2px solid #E5E3DF; border-radius: 18px;
      padding: 20px 18px; text-align: left; background: #fff;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s, border-color 0.2s;
    }
    .diff-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px -8px rgba(9,27,20,0.10); }
    .diff-card.on { transform: translateY(-2px); }

    /* ── Category chip ────────────────────────────── */
    .chip {
      padding: 7px 14px; border-radius: 9999px;
      border: 1px solid #E5E3DF;
      font-size: 12px; font-weight: 600;
      cursor: pointer; background: #fff; color: rgba(9,27,20,0.62);
      transition: all 0.15s; user-select: none;
    }
    .chip:hover { border-color: rgba(9,27,20,0.28); background: rgba(9,27,20,0.03); }
    .chip.on    { background: #CC5833; color: #fff; border-color: #CC5833; }

    /* ── Answer inputs ────────────────────────────── */
    .ans-inp {
      width: 100%; background: #F9F7F2; border: 1.5px solid #E5E3DF;
      border-radius: 12px; padding: 11px 14px;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; color: #091B14;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .ans-inp:focus { outline: none; border-color: #CC5833; box-shadow: 0 0 0 3px rgba(204,88,51,0.1); }
    .ans-inp::placeholder { color: rgba(9,27,20,0.28); }

    /* ── Badge ────────────────────────────────────── */
    .badge-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 9999px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Noise overlay ────────────────────────────── */
    .noise { position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

    /* ── Tweaks panel ─────────────────────────────── */
    #tweaks-panel {
      position: fixed; bottom: 68px; right: 18px; z-index: 600;
      background: #fff; border: 1px solid #E5E3DF;
      border-radius: 16px; padding: 14px 16px;
      box-shadow: 0 20px 48px -8px rgba(9,27,20,0.14);
      width: 238px; display: none;
    }
    #tweaks-panel.visible { display: block; }
    .tw-head { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:rgba(9,27,20,0.35); margin-bottom:10px; }
    .tw-btn {
      display: block; width: 100%; text-align: left;
      padding: 7px 10px; border-radius: 8px; margin-bottom: 3px;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid transparent;
      background: rgba(9,27,20,0.04); color: rgba(9,27,20,0.65);
      transition: background 0.13s;
    }
    .tw-btn:hover { background: rgba(9,27,20,0.08); }
    .tw-btn.tw-on { background: #CC5833; color: #fff; }
    .tw-hr { height: 1px; background: #E5E3DF; margin: 8px 0; }

    /* ── Scrollbar ────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(9,27,20,0.1); border-radius: 99px; }

    /* ── Reduced motion ───────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .flip-inner, .ring-fill, .prog-fill, .au { transition: none !important; animation: none !important; opacity: 1 !important; }
    }
  </style>
</head>

  <!-- ═══ TWEAKS PANEL ══════════════════════════════════════ -->

<script>
// ═══════════════════════════════════════════════════════════
// REAL CLINICAL DATA — patientfallsbank_draft.md
// ═══════════════════════════════════════════════════════════
const SESSION = {

const CASES = [

    status: '<p>Tand 36: Stor gammal amalgamfyllning med sekundärkaries distalt. <strong>Perkussion ++</strong>. Kyltest: Fördröjd, kraftig smärta som dröjer kvar flera minuter efter stimulistimulering — patognomont för irreversibel pulpit. Värmetest provocerar ytterligare smärta.</p><p style="margin-top:10px">Röntgen: Stor amalgamfyllning utan synlig periapikal patologi, men marginell karies distalt ned mot pulpan.</p>',

// ═══ DIFFICULTY COLORS ═════════════════════════════════════

const DIFF_DESCS  = {
  basic:    'Vanliga fall och tydlig klinisk status',
  standard: 'Varierad klinik och differentialdiagnoser',
  advanced: 'Komplexa fall med TLV- och läkemedelsfokus',
};
const AREA_COLORS = {
  endodonti: '#CC5833', parodontologi: '#2D6A4F', protetik: '#0E3B52',
  oralmedicin: '#C9A84C', kirurgi: '#5B21B6', bettfysiologi: '#0D9488',

};

// ═══ STATE ═════════════════════════════════════════════════
let view       = 'idle';
let selDiff    = 'standard';
let selCats    = [];
let timerSec   = 0;
let timerTick  = null;
let activeCaseIdx = 1;   // Show case 2 (Parodontologi) for presentation demo

const ACTIVE_CASE = CASES[activeCaseIdx];

// ═══ UTILITIES ═════════════════════════════════════════════
const $    = id => document.getElementById(id);
const esc  = s  => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const scoreCol = (pct) => pct >= 85 ? '#2D6A4F' : pct >= 60 ? '#E07B39' : '#C1121F';

function stopTimer() { if (timerTick) { clearInterval(timerTick); timerTick = null; } }
function startTimer() {
  stopTimer(); timerSec = 0;
  timerTick = setInterval(() => {
    timerSec++;
    const el = $('timer-el');
    if (el) {
      const m = String(Math.floor(timerSec/60)).padStart(2,'0');
      const s = String(timerSec % 60).padStart(2,'0');
      el.textContent = `${m}:${s}`;
    }
  }, 1000);
}

// ═══ RENDER FUNCTIONS ══════════════════════════════════════

function vIdle() {
  const pct = Math.round((SESSION_RESULTS.totalScore / SESSION_RESULTS.maxScore) * 100);
  return `
<div class="max-w-3xl mx-auto px-5 pt-12 pb-24">

// ═══ NAVIGATION ════════════════════════════════════════════
function goTo(v) {
  view = v;
  stopTimer();

  // Sync tweaks buttons
  ['idle','presenting','feedback','flipped','results'].forEach(k => {
    const b = $(`tw-${k}`);
    if (b) b.classList.toggle('tw-on', k === v);
  });

  render();

  if (v === 'presenting') {
    startTimer();
  }

  // Auto-flip feedback after 2s
  if (v === 'feedback') {
    setTimeout(() => {
      const fc = $('flip-card');
      if (fc && !fc.classList.contains('flipped')) {
        fc.classList.add('flipped');
        const twFlip = $('tw-flipped');
        const twFeed = $('tw-feedback');
        if (twFlip) twFlip.classList.add('tw-on');
        if (twFeed) twFeed.classList.remove('tw-on');
        view = 'flipped';
      }
    }, 2000);
  }

  // Animate result ring
  if (v === 'results') {
    setTimeout(() => {
      const ring = $('result-ring');
      if (ring) {
        const R = 70, circ = 2 * Math.PI * R;
        const pct = Math.round((SESSION_RESULTS.totalScore / SESSION_RESULTS.maxScore) * 100);
        ring.style.strokeDashoffset = String(circ - (circ * pct / 100));
      }
    }, 120);
  }
}

function pickDiff(id) {
  selDiff = id;
  ['basic','standard','advanced'].forEach(d => {
    const btn = $(`dif-${d}`);
    if (!btn) return;
    btn.classList.toggle('on', d === id);
    btn.style.borderColor = d === id ? DIFF_COLORS[d] : '#E5E3DF';
    btn.style.boxShadow = d === id ? `0 4px 20px -4px ${DIFF_COLORS[d]}28` : '';
    btn.style.transform = d === id ? 'translateY(-2px)' : '';
    btn.querySelector('span:first-child').style.color = d === id ? DIFF_COLORS[d] : '#091B14';
  });
}

function pickCat(name, slug) {
  const idx = selCats.indexOf(name);
  if (idx >= 0) selCats.splice(idx, 1); else selCats.push(name);
  const chip = $(`cat-${slug}`);
  if (chip) chip.classList.toggle('on', selCats.includes(name));
}

function switchDiff(d) { selDiff = d; if (view === 'idle') render(); }

// ═══ RENDER ════════════════════════════════════════════════
function render() {
  const app = $('app');
  if (!app) return;
  if      (view === 'idle')       app.innerHTML = vIdle();
  else if (view === 'presenting') app.innerHTML = vPresenting();
  else if (view === 'feedback')   app.innerHTML = vFeedback(false);
  else if (view === 'flipped')    app.innerHTML = vFeedback(true);
  else if (view === 'results')    app.innerHTML = vResults();
}

// ═══ TWEAKS PANEL PROTOCOL ═════════════════════════════════
window.addEventListener('message', function(e) {
  if (e.data?.type === '__activate_edit_mode')   $('tweaks-panel')?.classList.add('visible');
  if (e.data?.type === '__deactivate_edit_mode') $('tweaks-panel')?.classList.remove('visible');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

// ═══ INIT ══════════════════════════════════════════════════
render();
</script>
</body>
</html>
