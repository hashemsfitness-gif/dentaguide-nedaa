<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Läkemedelsreferens — Tandguide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=IBM+Plex+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --moss:#1E3028;--moss-l:#2E4036;--clay:#CC5833;--cream:#F2F0E9;
  --charcoal:#1A1A1A;--gold:#C9A84C;--ok:#2D6A4F;--danger:#C1121F;--warn:#E07B39;
  --red-bg:rgba(193,18,31,.07);--red-border:rgba(193,18,31,.18);
  --yellow-bg:rgba(201,168,76,.08);--yellow-border:rgba(201,168,76,.25);
  --green-bg:rgba(45,106,79,.07);--green-border:rgba(45,106,79,.2);
  --blue-bg:rgba(26,74,122,.07);--blue-border:rgba(26,74,122,.18);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{background:var(--moss);padding:.875rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none}
.logo-ic{width:28px;height:28px;background:var(--clay);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-tx{font-weight:800;font-size:1rem;color:var(--cream)}
.logo-tx span{color:var(--clay)}
.hdr-badge{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:rgba(242,240,233,.4);letter-spacing:.08em}

/* SEARCH BAR */
.search-section{background:var(--moss-l);padding:1.25rem 1.5rem;border-bottom:1px solid rgba(242,240,233,.06)}
.search-inner{max-width:960px;margin:0 auto}
.search-title{font-size:1.3rem;font-weight:800;color:var(--cream);margin-bottom:.25rem}
.search-title span{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--clay);font-size:1.6rem}
.search-sub{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:rgba(242,240,233,.4);margin-bottom:.875rem}
.src-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.875rem}
.src{font-family:'IBM Plex Mono',monospace;font-size:.58rem;padding:.15rem .5rem;border-radius:2rem;border:1px solid rgba(201,168,76,.3);color:var(--gold)}
.search-wrap{position:relative}
.search-ic{position:absolute;left:.875rem;top:50%;transform:translateY(-50%);font-size:.9rem;color:rgba(242,240,233,.3);pointer-events:none}
.search-input{width:100%;padding:.7rem .875rem .7rem 2.5rem;background:rgba(255,255,255,.07);border:1.5px solid rgba(242,240,233,.12);border-radius:.875rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;font-weight:600;color:var(--cream);outline:none;transition:all .3s}
.search-input::placeholder{color:rgba(242,240,233,.3)}
.search-input:focus{border-color:var(--clay);background:rgba(255,255,255,.1)}
.filter-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.75rem}
.f-btn{padding:.3rem .75rem;border-radius:2rem;border:1.5px solid rgba(242,240,233,.1);background:transparent;font-family:'IBM Plex Mono',monospace;font-size:.62rem;font-weight:600;color:rgba(242,240,233,.4);cursor:pointer;transition:all .2s}
.f-btn:hover,.f-btn.active{border-color:var(--clay);color:var(--clay);background:rgba(204,88,51,.1)}
.result-count{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:rgba(242,240,233,.35);margin-top:.5rem}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:1.25rem 1.5rem}
.drug-list{display:flex;flex-direction:column;gap:.875rem}

/* DRUG CARD */
.drug-card{background:white;border-radius:1.5rem;border:1px solid rgba(26,26,26,.06);box-shadow:0 2px 12px rgba(30,48,40,.05);overflow:hidden;transition:box-shadow .25s}
.drug-card:hover{box-shadow:0 6px 24px rgba(30,48,40,.1)}
.drug-card[data-hidden="true"]{display:none}

.dc-head{padding:1rem 1.25rem;display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;cursor:pointer;user-select:none}
.dc-head-left{flex:1;min-width:0}
.dc-top-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:.3rem}
.dc-name{font-size:1rem;font-weight:800;color:var(--charcoal)}
.dc-examples{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:rgba(26,26,26,.4);margin-top:.15rem}
.badge{font-family:'IBM Plex Mono',monospace;font-size:.58rem;font-weight:600;padding:.18rem .5rem;border-radius:.35rem;white-space:nowrap}
.badge-red{background:rgba(193,18,31,.1);color:var(--danger)}
.badge-yellow{background:rgba(201,168,76,.12);color:#7a5e00}
.badge-green{background:rgba(45,106,79,.08);color:var(--ok)}
.badge-blue{background:rgba(26,74,122,.08);color:#1a4a7a}
.badge-gray{background:rgba(26,26,26,.07);color:rgba(26,26,26,.55)}
.cat-pill{font-family:'IBM Plex Mono',monospace;font-size:.58rem;padding:.18rem .5rem;border-radius:.35rem;font-weight:600}

.dc-chevron{font-size:.9rem;color:rgba(26,26,26,.25);transition:transform .3s;flex-shrink:0;margin-top:.2rem}
.drug-card.open .dc-chevron{transform:rotate(180deg)}

/* COLLAPSED SUMMARY */
.dc-summary{padding:0 1.25rem .875rem;display:flex;flex-wrap:wrap;gap:.4rem}
.sum-tag{font-family:'IBM Plex Mono',monospace;font-size:.62rem;padding:.2rem .6rem;border-radius:.4rem;font-weight:600}
.sum-red{background:var(--red-bg);border:1px solid var(--red-border);color:var(--danger)}
.sum-yellow{background:var(--yellow-bg);border:1px solid var(--yellow-border);color:#7a5e00}
.sum-green{background:var(--green-bg);border:1px solid var(--green-border);color:var(--ok)}

/* EXPANDED BODY */
.dc-body{display:none;border-top:1px solid rgba(26,26,26,.06);padding:1.25rem}
.drug-card.open .dc-body{display:block}

.section-block{margin-bottom:1.25rem}
.section-block:last-child{margin-bottom:0}
.sb-title{font-family:'IBM Plex Mono',monospace;font-size:.62rem;font-weight:600;color:rgba(26,26,26,.4);letter-spacing:.12em;margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.sb-title::after{content:'';flex:1;height:1px;background:rgba(26,26,26,.06)}

/* TREATMENT GRID */
.treat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.5rem}
.treat-item{border-radius:.75rem;padding:.625rem .875rem;font-family:'IBM Plex Mono',monospace;font-size:.65rem;line-height:1.5}
.treat-ok{background:var(--green-bg);border:1px solid var(--green-border);color:#1a3d2b}
.treat-caution{background:var(--yellow-bg);border:1px solid var(--yellow-border);color:#5a3e00}
.treat-avoid{background:var(--red-bg);border:1px solid var(--red-border);color:#7a0a0a}
.treat-label{font-weight:700;display:block;margin-bottom:.2rem}

/* INFO ROWS */
.info-rows{display:flex;flex-direction:column;gap:.35rem}
.info-row{display:flex;gap:.75rem;padding:.45rem .625rem;border-radius:.5rem;background:rgba(26,26,26,.025);font-family:'IBM Plex Mono',monospace;font-size:.65rem;line-height:1.5}
.ir-icon{flex-shrink:0;width:1rem;text-align:center}
.ir-text{flex:1;color:var(--charcoal)}
.ir-text strong{color:var(--charcoal);font-weight:700}
.info-row.red{background:var(--red-bg);border:1px solid var(--red-border)}
.info-row.red .ir-text{color:#6b0808}
.info-row.yellow{background:var(--yellow-bg);border:1px solid var(--yellow-border)}
.info-row.yellow .ir-text{color:#5a3e00}
.info-row.green{background:var(--green-bg);border:1px solid var(--green-border)}
.info-row.green .ir-text{color:#1a3d2b}
.info-row.blue{background:var(--blue-bg);border:1px solid var(--blue-border)}
.info-row.blue .ir-text{color:#0f2d4a}

/* DRUG INTERACTIONS TABLE */
.interaction-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.iact-item{border-radius:.625rem;padding:.5rem .75rem;font-family:'IBM Plex Mono',monospace;font-size:.63rem;line-height:1.5}
.iact-item strong{display:block;margin-bottom:.15rem}
.iact-c{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);color:#5a3e00}
.iact-d{background:var(--red-bg);border:1px solid var(--red-border);color:#6b0808}

/* PLACEHOLDER */
.no-results{text-align:center;padding:3rem 1rem;opacity:.3;font-family:'IBM Plex Mono',monospace;font-size:.8rem}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(30,48,40,.2);border-radius:10px}

@media(max-width:600px){
  .treat-grid{grid-template-columns:1fr}
  .interaction-grid{grid-template-columns:1fr}
  .dc-head{flex-direction:row}
}
</style>
</head>

// ═══════════════════════════════════════════════════════════════════
// STATE & RENDER
// ═══════════════════════════════════════════════════════════════════
let currentFilter = 'alla';
let currentSearch = '';

function onSearch(q) {
  currentSearch = q.toLowerCase();
  render();
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = document.getElementById('drugList');
  const noRes = document.getElementById('noResults');
  let visible = 0;

  DRUGS.forEach(d => {
    const card = document.getElementById('card-' + d.id);
    const matchCat = currentFilter === 'alla' || d.cat === currentFilter;
    const matchSearch = !currentSearch ||
      d.name.toLowerCase().includes(currentSearch) ||
      d.examples.toLowerCase().includes(currentSearch) ||
      d.tags.some(t => t.toLowerCase().includes(currentSearch)) ||
      (d.indikation && d.indikation.toLowerCase().includes(currentSearch)) ||
      d.viktigt.some(v => v.text.toLowerCase().includes(currentSearch));
    const show = matchCat && matchSearch;
    card.dataset.hidden = !show;
    card.style.display = show ? 'block' : 'none';
    if (show) visible++;
  });

  document.getElementById('resultCount').textContent =
    visible === DRUGS.length ? `${DRUGS.length} läkemedelsgrupper` : `${visible} av ${DRUGS.length} matchar`;
  noRes.style.display = visible === 0 ? 'block' : 'none';
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════════
// BUILD CARDS
// ═══════════════════════════════════════════════════════════════════
function buildCards() {
  const list = document.getElementById('drugList');
  const riskColors = {'HÖG':'badge-red','MEDEL':'badge-yellow','LÅG':'badge-green','LÅG–MEDEL':'badge-green','MEDEL–HÖG':'badge-yellow','HÖG — MRONJ-risk':'badge-red','HÖG — interaktionsrisk':'badge-red'};

  list.innerHTML = DRUGS.map(d => {
    const riskBadge = riskColors[d.risk] || 'badge-yellow';
    const typColors = {ok:'treat-ok', caution:'treat-caution', avoid:'treat-avoid'};

    const summaryTags = d.summary.map(s => {
      const cls = s.startsWith('❌') ? 'sum-red' : s.startsWith('⚠️') ? 'sum-yellow' : 'sum-green';
      return `<span class="sum-tag ${cls}">${s}</span>`;
    }).join('');

    const behandlingar = d.behandlingar.map(b =>
      `<div class="treat-item ${typColors[b.typ]}">
        <strong class="treat-label">${b.typ === 'ok' ? '✓' : b.typ === 'caution' ? '⚠️' : '❌'} ${b.label}</strong>
        ${b.text}
      </div>`
    ).join('');

    const viktigtRows = d.viktigt.map(v =>
      `<div class="info-row ${v.typ}">
        <span class="ir-icon">${v.typ==='red'?'❌':v.typ==='yellow'?'⚠️':v.typ==='green'?'✓':'ℹ️'}</span>
        <span class="ir-text">${v.text}</span>
      </div>`
    ).join('');

    const interaktioner = d.interaktioner.length ? d.interaktioner.map(i =>
      `<div class="iact-item ${i.klass==='D'?'iact-d':'iact-c'}">
        <strong>Klass ${i.klass}: ${i.lm}</strong>
        ${i.text}
      </div>`
    ).join('') : '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.65rem;color:rgba(26,26,26,.35);padding:.25rem 0">Inga kliniskt relevanta interaktioner med vanliga tandvårdsläkemedel</div>';

    return `
    <div class="drug-card" id="card-${d.id}" data-cat="${d.cat}">
      <div class="dc-head" onclick="toggleCard('${d.id}')">
        <div class="dc-left">
          <div class="dc-top-row">
            <span class="dc-name">${d.name}</span>
            <span class="badge ${riskBadge}">Risk: ${d.risk}</span>
          </div>
          <div class="dc-examples">${d.examples}</div>
          <div style="margin-top:.4rem;font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:rgba(26,26,26,.4)">${d.indikation}</div>
        </div>
        <span class="dc-chevron">▼</span>
      </div>

      <div class="dc-summary">${summaryTags}</div>

      <div class="dc-body">

        <div class="section-block">
          <div class="sb-title">BEHANDLING / ÅTGÄRDER</div>
          <div class="treat-grid">${behandlingar}</div>
        </div>

        <div class="section-block">
          <div class="sb-title">VIKTIGT ATT VETA</div>
          <div class="info-rows">${viktigtRows}</div>
        </div>

        <div class="section-block">
          <div class="sb-title">INTERAKTIONER MED TANDVÅRDSLÄKEMEDEL</div>
          <div class="interaction-grid">${interaktioner}</div>
        </div>

        <div class="section-block">
          <div class="sb-title">KÄLLA</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:rgba(26,26,26,.4);line-height:1.6">${d.kalla}</div>
        </div>

      </div>
    </div>`;
  }).join('');

  render();
}

document.addEventListener('DOMContentLoaded', () => {
  buildCards();
  document.getElementById('resultCount').textContent = `${DRUGS.length} läkemedelsgrupper`;
});
</script>
</body>
</html>
