version: '3.8'

services:
  app:
    build: .
    ports:
      - "3002:3000"
      - "8400:8400"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true
